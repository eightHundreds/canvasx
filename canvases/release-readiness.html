    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      /* CANVAS_APP_START */
      const h = React.createElement;
      const {
        Callout,
        CanvasProvider,
        Card,
        CardBody,
        CardHeader,
        Divider,
        Grid,
        H1,
        H2,
        LineChart,
        Pill,
        Row,
        Select,
        Stack,
        Stat,
        Table,
        Text,
        useCanvasState,
      } = StandaloneCanvas;

      const trendDates = ["Jul 5", "Jul 6", "Jul 7", "Jul 8", "Jul 9", "Jul 10", "Jul 11"];

      const components = [
        {
          id: "gateway",
          name: "Edge gateway",
          owner: "Platform",
          status: "Ready",
          rowTone: "success",
          confidence: 92,
          checksPassed: 612,
          checksTotal: 620,
          blockers: 0,
          risk: "Low",
          openDefects: [7, 6, 6, 5, 4, 3, 2],
          highSeverity: [2, 2, 2, 1, 1, 1, 0],
        },
        {
          id: "api",
          name: "Core API",
          owner: "Services",
          status: "Watch",
          rowTone: "warning",
          confidence: 78,
          checksPassed: 780,
          checksTotal: 820,
          blockers: 0,
          risk: "Elevated",
          openDefects: [12, 11, 10, 10, 9, 7, 5],
          highSeverity: [4, 4, 3, 3, 3, 2, 1],
        },
        {
          id: "web",
          name: "Web client",
          owner: "Experience",
          status: "Ready",
          rowTone: "success",
          confidence: 88,
          checksPassed: 514,
          checksTotal: 528,
          blockers: 0,
          risk: "Low",
          openDefects: [9, 8, 7, 7, 6, 4, 3],
          highSeverity: [2, 2, 2, 2, 1, 1, 0],
        },
        {
          id: "workers",
          name: "Async workers",
          owner: "Runtime",
          status: "Blocked",
          rowTone: "danger",
          confidence: 69,
          checksPassed: 431,
          checksTotal: 465,
          blockers: 1,
          risk: "High",
          openDefects: [8, 8, 7, 7, 6, 5, 4],
          highSeverity: [3, 3, 3, 2, 2, 2, 1],
        },
      ];

      const filterOptions = [
        { value: "all", label: "All components" },
        ...components.map((component) => ({ value: component.id, label: component.name })),
      ];

      function metricTone(value, successAt, warningAt) {
        if (value >= successAt) return "success";
        if (value >= warningAt) return "warning";
        return "danger";
      }

      function ReleaseReadinessReport() {
        const [savedScope, setSavedScope] = useCanvasState("component-filter", "all");
        const scope = filterOptions.some((option) => option.value === savedScope) ? savedScope : "all";
        const visibleComponents = scope === "all"
          ? components
          : components.filter((component) => component.id === scope);
        const scopeLabel = scope === "all" ? "All components" : visibleComponents[0].name;
        const confidence = Math.round(
          visibleComponents.reduce((sum, component) => sum + component.confidence, 0) /
            visibleComponents.length,
        );
        const checksPassed = visibleComponents.reduce(
          (sum, component) => sum + component.checksPassed,
          0,
        );
        const checksTotal = visibleComponents.reduce(
          (sum, component) => sum + component.checksTotal,
          0,
        );
        const passRate = checksPassed / checksTotal * 100;
        const blockers = visibleComponents.reduce((sum, component) => sum + component.blockers, 0);
        const sumTrend = (key) => trendDates.map((_, dayIndex) =>
          visibleComponents.reduce((sum, component) => sum + component[key][dayIndex], 0),
        );
        const openDefectTrend = sumTrend("openDefects");
        const highSeverityTrend = sumTrend("highSeverity");
        const openDefects = openDefectTrend[openDefectTrend.length - 1];
        const gateThreshold = scope === "all" ? 12 : 3;

        let decisionTone = "success";
        let decisionTitle = "Ready to ship";
        let decisionDetail = scopeLabel + " meets the current release gates.";
        if (blockers > 0) {
          decisionTone = scope === "all" ? "warning" : "danger";
          decisionTitle = scope === "all" ? "Conditional go" : "Release blocked";
          decisionDetail = blockers + " migration blocker remains in Async workers; clear it before production rollout.";
        } else if (confidence < 85 || openDefects > gateThreshold) {
          decisionTone = "warning";
          decisionTitle = "Go with monitoring";
          decisionDetail = scopeLabel + " has no blocker, but confidence or open defects remain outside the preferred gate.";
        }

        return h(
          "main",
          { className: "canvas-page" },
          h(
            Stack,
            { gap: 22 },
            h(
              Stack,
              { gap: 7 },
              h(
                Row,
                { gap: 8, wrap: true },
                h(Pill, { size: "sm", active: true }, "Release candidate 7"),
                h(Pill, { size: "sm" }, "Target: Jul 12, 22:00 UTC"),
              ),
              h(H1, null, "Atlas 4.8 release readiness"),
              h(
                Text,
                { tone: "secondary" },
                "Quality gate snapshot for the production candidate, updated Jul 11, 2026 at 18:00 UTC.",
              ),
            ),
            h(
              Callout,
              { tone: decisionTone, title: decisionTitle },
              decisionDetail,
            ),
            h(
              Row,
              { justify: "space-between", align: "end", gap: 14, wrap: true },
              h(
                Stack,
                { gap: 3 },
                h(H2, null, "Gate summary"),
                h(Text, { tone: "tertiary", size: "small" }, "Scope: " + scopeLabel),
              ),
              h(
                "label",
                { style: { display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" } },
                h(Text, { as: "span", size: "small", tone: "secondary", weight: "medium" }, "Component"),
                h(Select, {
                  value: scope,
                  onChange: setSavedScope,
                  options: filterOptions,
                  style: { minWidth: 190 },
                }),
              ),
            ),
            h(
              Grid,
              { columns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 18 },
              h(Stat, {
                value: confidence + "%",
                label: "Release confidence",
                tone: metricTone(confidence, 85, 75),
              }),
              h(Stat, {
                value: passRate.toFixed(1) + "%",
                label: "Automated checks passed",
                tone: metricTone(passRate, 97, 94),
              }),
              h(Stat, {
                value: String(openDefects),
                label: "Open defects",
                tone: openDefects <= gateThreshold ? "success" : "warning",
              }),
              h(Stat, {
                value: String(blockers),
                label: "Release blockers",
                tone: blockers === 0 ? "success" : "danger",
              }),
            ),
            h(Divider),
            h(
              Stack,
              { gap: 10 },
              h(
                Stack,
                { gap: 3 },
                h(H2, null, "Seven-day defect trend"),
                h(
                  Text,
                  { tone: "tertiary", size: "small" },
                  "Daily open defect count for " + scopeLabel + "; high severity is a subset of open defects.",
                ),
              ),
              h(
                Card,
                null,
                h(
                  CardHeader,
                  { trailing: h(Pill, { size: "sm" }, "Gate <= " + gateThreshold) },
                  "Open defects, Jul 5-11",
                ),
                h(
                  CardBody,
                  null,
                  h(LineChart, {
                    categories: trendDates,
                    series: [
                      { name: "Open defects", data: openDefectTrend, tone: "warning" },
                      { name: "High severity", data: highSeverityTrend, tone: "danger" },
                    ],
                    height: 280,
                    beginAtZero: true,
                    referenceLines: [
                      { value: gateThreshold, label: "Gate", tone: "info" },
                    ],
                  }),
                ),
              ),
            ),
            h(
              Stack,
              { gap: 10 },
              h(
                Stack,
                { gap: 3 },
                h(H2, null, "Component status"),
                h(
                  Text,
                  { tone: "tertiary", size: "small" },
                  "Latest candidate validation by owning team. Checks are passed / total.",
                ),
              ),
              h(Table, {
                headers: ["Component", "Owner", "Gate", "Checks", "Open", "Risk"],
                rows: visibleComponents.map((component) => [
                  h(Text, { as: "span", weight: "semibold" }, component.name),
                  component.owner,
                  h(Pill, { size: "sm", active: component.status === "Ready" }, component.status),
                  component.checksPassed.toLocaleString() + " / " + component.checksTotal.toLocaleString(),
                  String(component.openDefects[component.openDefects.length - 1]),
                  component.risk,
                ]),
                rowTone: visibleComponents.map((component) => component.rowTone),
                columnAlign: ["left", "left", "left", "right", "right", "left"],
                striped: true,
              }),
            ),
            h(
              Text,
              { tone: "quaternary", size: "small" },
              "Source: fictional inline CI, test, and defect-tracker data prepared for this report.",
            ),
          ),
        );
      }

      function CanvasApp() {
        const theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        return h(
          CanvasProvider,
          { theme, storagePrefix: "atlas-48-release-readiness" },
          h(ReleaseReadinessReport),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        h(React.StrictMode, null, h(CanvasApp)),
      );
      /* CANVAS_APP_END */
    </script>
  </body>
</html>
